<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA Sociology Paper 3 — Revision Hub</title>
<style>
:root {
  --bg:#ffffff; --bg2:#f7f7f5; --bg3:#f0eeea;
  --txt:#1a1a18; --txt2:#5a5a56; --txt3:#9a9a95;
  --bdr:rgba(0,0,0,0.1); --bdr2:rgba(0,0,0,0.2); --bdr3:rgba(0,0,0,0.3);
  --purple:#534AB7; --purple-bg:#EEEDFE; --purple-txt:#3C3489;
  --teal:#0F6E56; --teal-bg:#E1F5EE; --teal-txt:#085041;
  --blue:#185FA5; --blue-bg:#E6F1FB; --blue-txt:#0C447C;
  --amber:#854F0B; --amber-bg:#FAEEDA; --amber-txt:#633806;
  --coral:#993C1D; --coral-bg:#FAECE7; --coral-txt:#712B13;
  --r8:8px; --r12:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2b;
    --txt:#f0ede8; --txt2:#a0a09a; --txt3:#6e6e68;
    --bdr:rgba(255,255,255,0.1); --bdr2:rgba(255,255,255,0.2); --bdr3:rgba(255,255,255,0.3);
    --purple-bg:#26215C; --purple-txt:#CECBF6;
    --teal-bg:#04342C; --teal-txt:#9FE1CB;
    --blue-bg:#042C53; --blue-txt:#B5D4F4;
    --amber-bg:#412402; --amber-txt:#FAC775;
    --coral-bg:#4A1B0C; --coral-txt:#F5C4B3;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--txt);min-height:100vh;}
.shell{max-width:800px;margin:0 auto;padding:2rem 1.25rem 5rem;}

/* Header */
.masthead{border-bottom:2px solid var(--txt);padding-bottom:1rem;margin-bottom:1.5rem;}
.masthead-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;}
.masthead h1{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt);}
.masthead h2{font-size:28px;font-weight:700;color:var(--txt);line-height:1.15;margin:6px 0;}
.masthead h3{font-size:15px;font-weight:400;color:var(--txt2);margin-bottom:10px;}
.masthead-meta{font-size:12px;color:var(--txt3);display:flex;gap:16px;flex-wrap:wrap;}
.masthead-meta span{display:flex;align-items:center;gap:4px;}

/* Nav */
.nav-bar{display:flex;gap:0;margin-bottom:1.75rem;border:1px solid var(--bdr2);border-radius:var(--r8);overflow:hidden;background:var(--bg2);}
.nav-btn{flex:1;padding:9px 4px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:transparent;color:var(--txt2);transition:all 0.15s;border-right:1px solid var(--bdr);}
.nav-btn:last-child{border-right:none;}
.nav-btn:hover{background:var(--bg3);color:var(--txt);}
.nav-btn.active{background:var(--bg);color:var(--txt);font-weight:600;}

/* Topic cards — home */
.topic-list{display:flex;flex-direction:column;gap:10px;}
.topic-card{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r12);padding:1.25rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.topic-card:hover{border-color:var(--bdr2);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:8px;}
.tc-title{font-size:15px;font-weight:600;color:var(--txt);line-height:1.3;}
.tc-ref{font-size:11px;color:var(--txt3);white-space:nowrap;}
.tc-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:10px;}
.tc-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.tc-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;}
.b-blue{background:var(--blue-bg);color:var(--blue-txt);}
.b-purple{background:var(--purple-bg);color:var(--purple-txt);}
.b-teal{background:var(--teal-bg);color:var(--teal-txt);}
.b-amber{background:var(--amber-bg);color:var(--amber-txt);}
.b-gray{background:var(--bg2);color:var(--txt2);border:1px solid var(--bdr);}
.tc-qs{font-size:12px;color:var(--txt3);}
.tc-arrow{color:var(--txt3);font-size:18px;}

/* Topic detail */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txt2);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;margin-bottom:1.25rem;transition:color 0.15s;}
.back-btn:hover{color:var(--txt);}
.topic-header{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r12);padding:1.4rem;margin-bottom:1.25rem;}
.topic-header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.topic-header h2{font-size:20px;font-weight:700;color:var(--txt);line-height:1.3;}
.topic-section-ref{font-size:12px;color:var(--txt3);}
.topic-explanation{font-size:14px;color:var(--txt2);line-height:1.75;margin-bottom:12px;}
.topic-explanation p{margin-bottom:8px;}
.topic-explanation p:last-child{margin-bottom:0;}
.key-thinkers{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.exam-tip{background:var(--amber-bg);border-left:3px solid var(--amber);border-radius:0 var(--r8) var(--r8) 0;padding:10px 14px;font-size:13px;color:var(--amber-txt);line-height:1.6;margin-top:12px;}
.exam-tip strong{font-weight:600;}

/* Paper-style questions */
.paper-section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);margin:1.5rem 0 0.75rem;padding-bottom:6px;border-bottom:1px solid var(--bdr);}
.q-block{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r12);padding:1.4rem;margin-bottom:1rem;}
.q-num-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.q-num{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--txt);flex-shrink:0;}
.q-type-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--txt3);}
.q-marks-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--blue-bg);color:var(--blue-txt);margin-left:auto;}
.item-box{background:var(--bg2);border-left:3px solid var(--blue);border-radius:0 var(--r8) var(--r8) 0;padding:12px 16px;margin-bottom:14px;}
.item-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--blue-txt);margin-bottom:6px;}
.item-text{font-size:13px;color:var(--txt);line-height:1.7;font-style:italic;}
.q-text{font-size:15px;font-weight:500;color:var(--txt);line-height:1.65;margin-bottom:14px;}
.q-instruction{font-size:13px;color:var(--txt2);margin-bottom:14px;font-style:italic;}
.answer-area{width:100%;min-height:90px;border:1px solid var(--bdr2);border-radius:var(--r8);padding:11px 13px;font-size:14px;font-family:inherit;color:var(--txt);background:var(--bg);resize:vertical;line-height:1.7;transition:border-color 0.15s,box-shadow 0.15s;}
.answer-area.essay-area{min-height:180px;}
.answer-area:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(83,74,183,0.12);}
.answer-area::placeholder{color:var(--txt3);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r8);border:1px solid var(--bdr2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--txt);transition:all 0.15s;}
.btn:hover{background:var(--bg2);border-color:var(--bdr3);}
.btn:active{transform:scale(0.98);}
.btn-ai{background:var(--purple-bg);color:var(--purple-txt);border-color:rgba(83,74,183,0.3);}
.btn-ai:hover{background:var(--purple-bg);filter:brightness(0.95);}

/* Mark scheme */
.ms-block{background:var(--teal-bg);border-radius:var(--r8);padding:1rem 1.1rem;margin-top:12px;border-left:3px solid var(--teal);}
.ms-heading{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--teal-txt);margin-bottom:10px;}
.ms-item{font-size:13px;color:var(--txt);line-height:1.7;padding:5px 0 5px 20px;position:relative;border-bottom:1px solid rgba(0,0,0,0.05);}
.ms-item:last-child{border-bottom:none;}
.ms-item::before{content:"✓";position:absolute;left:0;color:var(--teal);font-weight:700;font-size:11px;top:7px;}
.ms-note{font-size:12px;color:var(--txt2);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.06);}

/* AI block */
.ai-block{background:var(--purple-bg);border-radius:var(--r8);padding:1rem 1.1rem;margin-top:12px;border-left:3px solid var(--purple);}
.ai-heading{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--purple-txt);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.ai-body{font-size:13px;color:var(--txt);line-height:1.75;}
.ai-body strong{color:var(--purple-txt);font-weight:600;}
.score-chip{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px;margin-left:4px;}
.sc-hi{background:var(--teal-bg);color:var(--teal-txt);}
.sc-mid{background:var(--amber-bg);color:var(--amber-txt);}
.sc-lo{background:var(--coral-bg);color:var(--coral-txt);}

/* Quick fire */
.qf-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.shuffle-btn{width:100%;padding:10px;margin-top:8px;border-radius:var(--r8);border:1px dashed var(--bdr2);background:transparent;color:var(--txt2);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.15s;}
.shuffle-btn:hover{background:var(--bg);color:var(--txt);border-color:var(--bdr3);}

/* Essay guide */
.essay-guide{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r12);padding:1.1rem 1.25rem;margin-bottom:1.25rem;}
.essay-guide h4{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--txt);}
.essay-steps{display:flex;gap:6px;flex-wrap:wrap;}
.step-pill{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--bg2);border:1px solid var(--bdr);color:var(--txt2);}

/* Loading */
.loading-dot{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}

/* Section headers */
.section-title{font-size:22px;font-weight:700;color:var(--txt);margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--txt2);margin-bottom:1.5rem;line-height:1.6;}

/* Divider */
.divider{height:1px;background:var(--bdr);margin:1.5rem 0;}

/* Theorist pills — clickable */
.thinker-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg2);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;transition:all 0.15s;position:relative;}
.thinker-pill:hover{background:var(--purple-bg);color:var(--purple-txt);border-color:rgba(83,74,183,0.3);}

/* Theorist modal overlay */
.th-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
.th-modal{background:var(--bg);border:1px solid var(--bdr2);border-radius:var(--r12);padding:1.5rem;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.15);position:relative;}
.th-modal-name{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:2px;}
.th-modal-meta{font-size:12px;color:var(--txt3);margin-bottom:12px;}
.th-modal-idea{font-size:14px;color:var(--txt);line-height:1.75;margin-bottom:12px;}
.th-modal-quote{font-size:13px;color:var(--txt2);line-height:1.65;font-style:italic;background:var(--bg2);padding:10px 14px;border-radius:var(--r8);border-left:3px solid var(--purple);margin-bottom:12px;}
.th-modal-topics{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.th-modal-close{width:100%;padding:8px;border-radius:var(--r8);border:1px solid var(--bdr2);background:transparent;color:var(--txt2);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.15s;}
.th-modal-close:hover{background:var(--bg2);color:var(--txt);}
</style>
</head>
<body>
<div class="shell">

  <!-- Masthead styled after AQA paper -->
  <div class="masthead">
    <div class="masthead-top">
      <div>
        <h1>AQA · A-level Sociology (7192/3)</h1>
        <h2>Paper 3: Crime and Deviance<br>with Theory and Methods</h2>
        <h3>Interactive Revision Hub — Full Specification</h3>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;color:var(--txt2);line-height:1.8;">
          Maximum mark: <strong>80</strong><br>
          Time allowed: <strong>2 hours</strong><br>
          <span style="font-size:11px;color:var(--txt3);">Sections 3.3.1 &amp; 3.3.2</span>
        </div>
      </div>
    </div>
    <div class="masthead-meta">
      <span>📋 11 topics covered</span>
      <span>📝 Mark schemes included</span>
      <span>🤖 AI examiner feedback</span>
      <span>⚡ Quick fire mode</span>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav-bar" id="nav-bar">
    <button class="nav-btn active" onclick="showSection('home')">Topics</button>
    <button class="nav-btn" onclick="showSection('crime')">Crime &amp; Deviance</button>
    <button class="nav-btn" onclick="showSection('methods')">Theory &amp; Methods</button>
    <button class="nav-btn" onclick="showSection('theorists')">Theorists</button>
    <button class="nav-btn" onclick="showSection('quickfire')">Quick Fire ⚡</button>
    <button class="nav-btn" onclick="showSection('essay')">Essays</button>
  </div>

  <div id="main"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const TOPICS = [
  // ── CRIME & DEVIANCE ──
  {
    id:"social-order", section:"3.3.1", part:"crime",
    title:"Crime, Deviance, Social Order & Social Control",
    badges:[["b-blue","Crime & Deviance"],["b-purple","Theory"]],
    explanation:`<p>This topic explores the <strong>sociological definitions</strong> of crime and deviance and examines how society regulates behaviour. Crime refers to behaviour that violates codified law; deviance refers to behaviour that violates social norms but may not be illegal. The boundary between the two is fluid and socially constructed.</p>
<p><strong>Social order</strong> is maintained through two broad mechanisms. Formal social control operates through the state — police, courts, prisons — enforcing legal norms through coercion and punishment. Informal social control operates through institutions like family, education, peer groups and religion, which socialise individuals into accepting shared norms and values.</p>
<p>Functionalists (Parsons, Durkheim) see social control as necessary for maintaining consensus and social stability. Marxists (Gramsci, Althusser) argue social control serves ruling class interests — Althusser's Ideological State Apparatuses (ISAs) reproduce capitalism through ideology, while Repressive State Apparatuses (RSAs) enforce compliance. Foucault's concept of the panopticon illustrates how modern surveillance disciplines individuals to self-police.</p>`,
    thinkers:["Durkheim","Parsons","Becker","Foucault","Gramsci","Althusser","Cohen","Goffman"],
    tip:"Always link social control to <em>power</em> — who defines crime, who enforces it, and who benefits? Evaluation: does formal control reduce crime or just displace it?",
    questions:[
      {
        num:"01", type:"outline", marks:4,
        text:"Outline two ways in which social control agencies maintain social order.",
        ms:[
          "Formal control — police, courts, prisons deter and punish deviance through legal sanctions; coercive power of the state (Althusser's RSAs: army, police, prison enforce compliance by force)",
          "Informal control — family, education, religion socialise individuals into internalising shared norms and values; Parsons: primary socialisation produces consensus and conformity without coercion",
          "Surveillance and self-discipline — Foucault: panopticon as metaphor for modern disciplinary society; CCTV, digital monitoring means individuals internalise surveillance and self-police",
          "Ideological control — Gramsci: hegemony — ruling class secure consent through cultural and ideological leadership via media, education, religion rather than direct force alone"
        ]
      },
      {
        num:"02", type:"outline", marks:6,
        text:"Outline three differences between crime and deviance.",
        ms:[
          "Crime breaks formal codified law enforced by the state; deviance breaks informal social norms — all crime is deviant but not all deviance is criminal (e.g. being rude is deviant but not illegal)",
          "Crime is legally defined and applies across a jurisdiction; deviance is culturally and historically relative — varies by culture, time and place (e.g. homosexuality decriminalised in England and Wales 1967)",
          "Crime is sanctioned formally through the CJS — police, courts, prison; deviance is sanctioned informally through stigma, social exclusion or disapproval (Goffman: spoiled identity)",
          "Crime requires formal legal processes to record and prosecute; deviance is largely unmeasured — the dark figure problem is more acute for deviance",
          "Labelling theory (Becker): neither crime nor deviance is inherent in an act — both are labels applied through social reaction by moral entrepreneurs and enforcement agencies. The same act can be defined differently by different audiences"
        ]
      }
    ]
  },
  {
    id:"distribution", section:"3.3.1", part:"crime",
    title:"Social Distribution of Crime: Class, Gender & Ethnicity",
    badges:[["b-blue","Crime & Deviance"],["b-teal","Stratification"]],
    explanation:`<p>Official crime statistics consistently show <strong>patterns</strong> in who is recorded as committing crime: working-class males and young Black men are overrepresented; women and middle/upper-class people are underrepresented. However, sociologists question whether these patterns reflect actual offending or the operation of the criminal justice system itself.</p>
<p>On <strong>class</strong>: strain theory (Merton) argues that blocked legitimate means to achieve cultural goals leads working-class individuals to deviant adaptations. Left realists (Lea & Young) point to relative deprivation, marginalisation and subculture. Labelling theorists (Cicourel) argue police typifications over-target working-class areas, producing self-fulfilling statistics.</p>
<p>On <strong>gender</strong>: Heidensohn's control theory argues women face greater informal control at home and in public. The chivalry thesis (Pollak) claims women receive more lenient treatment from the CJS. Messerschmidt links male offending to doing masculinity.</p>
<p>On <strong>ethnicity</strong>: Hall et al. (Policing the Crisis) showed how media moral panics racialised crime. The Macpherson Report (1999) identified institutional racism in the Metropolitan Police. Left realists point to structural deprivation in Black communities rather than culture.</p>`,
    thinkers:["Merton","Cohen","Cloward & Ohlin","Lea & Young","Becker","Cicourel","Heidensohn","Pollak","Messerschmidt","Hall et al.","Macpherson","Walklate"],
    tip:"Always use patterns <em>and</em> explanations — don't just describe statistics, explain why. Crucially: are stats a reflection of real offending or of policing bias? That's your AO3.",
    questions:[
      {
        num:"01", type:"outline", marks:6,
        text:"Outline three reasons why females are less likely than males to appear in official crime statistics.",
        ms:[
          "Gender role socialisation: females are socialised into passivity, conformity, nurturing and empathy; males into risk-taking, aggression and independence. Females internalise norms more strongly (Oakley: gender role socialisation from birth)",
          "Informal social control (Heidensohn): women face greater surveillance and control — in the home by male partners, expectations to remain domestic, policing of behaviour in public spaces. This limits both the opportunity and freedom to offend",
          "Chivalry thesis (Pollak): the CJS treats women more leniently — police less likely to arrest, courts less likely to convict women. Female crime is systematically understated in official statistics; statistics reflect CJS sexism not just offending",
          "Masculinity theory (Messerschmidt, Connell): crime is a resource for 'doing masculinity' — young men use crime and risk-taking to accomplish hegemonic masculine identity. No equivalent social pressure operates on women",
          "Liberation thesis (Adler): as women's social position becomes more equal, female crime rises — the gender gap in crime is therefore social/structural not biological. Suggests offending is about opportunity and social norms, not sex"
        ]
      },
      {
        num:"02", type:"analyse", marks:10,
        item:"Official crime statistics consistently show that those from lower socioeconomic backgrounds make up the majority of convicted offenders. However, these statistics only reflect crimes that are detected, reported and prosecuted by the criminal justice system.",
        text:"Applying material from Item A and your knowledge, analyse two reasons why working-class individuals are overrepresented in official crime statistics.",
        ms:[
          "Selective law enforcement / labelling (Becker, Cicourel): police use typifications and stereotypes — over-patrol working-class areas, more likely to stop, arrest and charge working-class individuals regardless of actual behaviour. Becomes a self-fulfilling prophecy: official statistics then confirm the stereotype, justifying further targeting. Item supports this: stats only reflect crimes 'detected and prosecuted' — policing decisions shape what is recorded",
          "Strain theory (Merton): cultural goals (wealth, success, status) are shared across society but legitimate means to achieve them are unequally distributed. Working-class individuals face blocked opportunities — educational underachievement limits meritocratic routes. Respond through deviant adaptations: innovation (using illegal means to achieve goals). Relative deprivation (Lea & Young): poverty experienced alongside media images of affluence creates sense of injustice that drives crime",
          "Status frustration (Cohen): working-class boys fail by the standards of middle-class-dominated school system; form delinquent subcultures as a collective solution — inverting mainstream values to achieve status by alternative means",
          "AO3: working-class crime is more visible and more policed. White-collar and corporate crime of the middle and upper classes causes far greater financial harm but is largely undetected and unprosecuted (Sutherland: white-collar crime). Item directly supports critique: statistics are partial, reflecting the priorities of a class-biased CJS"
        ]
      }
    ]
  },
  {
    id:"media-crime", section:"3.3.1", part:"crime",
    title:"The Media and Crime",
    badges:[["b-blue","Crime & Deviance"],["b-amber","Contemporary"]],
    explanation:`<p>The media plays a major role in shaping public perceptions of crime, but sociologists argue this representation is systematically <strong>distorted</strong>. Media coverage dramatically overrepresents violent and sexual crime relative to actual statistics. It creates <strong>moral panics</strong> around particular groups defined as threats to social order.</p>
<p>Stan Cohen's study of mods and rockers in the 1960s showed how media coverage amplified and distorted events, creating <strong>folk devils</strong> (scapegoated groups) and generating public anxiety that justified increased policing. This led to a <strong>deviance amplification spiral</strong>: more police attention → more arrests → more media coverage → more public fear → more policing.</p>
<p>Hall et al. (Policing the Crisis, 1978) applied this to the mugging panic of the 1970s, arguing that media racialised street crime to divert attention from the crisis of capitalism and justify authoritarian state responses. The concept of <strong>news values</strong> (Young) explains why dramatic, negative, unusual events dominate crime coverage.</p>
<p>The media also constructs a <strong>victim hierarchy</strong> — white, middle-class, female victims receive disproportionate coverage (Christie's 'ideal victim'), distorting public understanding of who is really at risk.</p>`,
    thinkers:["Cohen","Hall et al.","Young","Christie","Jewkes","Surette","Baudrillard"],
    tip:"Moral panic is a process with stages — don't just name it, describe how it works: folk devil → media exaggeration → moral entrepreneurs → disproportionate response → deviancy amplification.",
    questions:[
      {
        num:"01", type:"outline", marks:4,
        text:"Outline two ways in which the media give a distorted view of crime.",
        ms:[
          "Overrepresentation of violent and sexual crime: media focuses on dramatic, newsworthy crimes — Cohen & Young: news values prioritise violence, novelty, celebrity. Creates false impression that violent crime is far more common than statistics show; public overestimates personal risk of victimisation",

      {
        num:"02", type:"analyse", marks:10,
        item:"Stan Cohen argued that the media plays a key role in creating moral panics about crime. The media identifies groups as threats to social values, which can lead to a disproportionate response from the police and public. However, not all sociologists agree that the media is the primary cause of public fear of crime.",
        text:"Applying material from Item A and your knowledge, analyse two reasons why moral panics about crime may develop.",
        ms:[
          "Media construction of folk devils (Cohen): media selects and exaggerates events, labelling certain groups as threats — mods and rockers framed as symbols of social breakdown. Moral entrepreneurs (Becker) amplify the threat; public anxiety grows. Item: 'identifies groups as threats to social values'. Media's news values (novelty, negativity, proximity) make crime ideal material for panic-generation",
          "Ruling class ideology (Hall et al.): moral panics are not random but ideologically motivated. The 1970s mugging panic served to distract attention from the economic crisis of capitalism and justify expansion of state power (authoritarian populism). Scapegoating Black youth displaced structural tensions onto a criminalised minority — crisis management through crime panic",
          "Deviance amplification spiral (Wilkins, Cohen): once a group is labelled, increased policing produces more recorded crime from that group, which appears to confirm the original panic, generating further media coverage and further policing — self-reinforcing cycle. Item: 'disproportionate response from police' feeds back into the spiral",

      {
        num:"03", type:"evaluate", marks:30,
        item:"Some sociologists argue that the best way to understand crime and deviance is to examine the way in which individuals and groups are labelled as deviant by powerful social groups. Once labelled, individuals may find it difficult to escape that label and may go on to commit further acts of deviance.",
        text:"Applying material from Item B and your knowledge, evaluate the usefulness of labelling theory in understanding crime and deviance.",
        ms:[
          "Becker (Outsiders, 1963): deviance is not inherent in an act but in the reaction of others. 'Deviant is one to whom the label has been successfully applied.' Moral entrepreneurs create rules; enforcers apply them selectively. Item: 'labelled as deviant by powerful social groups' — power to label is unequally distributed",
          "Primary and secondary deviance (Lemert): primary deviance is initial rule-breaking with little impact on identity. Secondary deviance occurs when individual internalises the deviant label — deviant identity becomes master status (Becker), reorganising self-concept and social relationships",

          "Evaluation — ignores initial causes: why did primary deviance occur? Labelling theory focuses on reaction, not structural causes — Marxists argue poverty and inequality drive crime regardless of labelling; left realists: labelling ignores real harm to working-class victims",
          "Evaluation — ignores victim: over-focus on offender's experience of labelling; neglects impact on victims of crime (left realism critique)",
          "Evaluation — practical application: diversion schemes, restorative justice, decriminalisation policies draw on labelling theory — avoid labelling minor offenders to prevent secondary deviance. Applied in youth justice. Successful application suggests theory has validity",
          "Evaluation — Marxism: ignores class and power more systematically — labels are not randomly applied but reflect ruling class interests. Chambliss: laws themselves serve bourgeois interests, not just enforcement practices",
          "Conclusion: labelling theory offers powerful insights into how CJS processes create and amplify crime, and explains class and ethnic patterns in statistics. However, it is criticised for ignoring structural causes of primary deviance, overemphasising the power of labels, neglecting victims, and failing to explain why some resist labels while others do not"

  {
    id:"globalisation", section:"3.3.1", part:"crime",
    title:"Globalisation, Green Crime & State Crime",
    badges:[["b-blue","Crime & Deviance"],["b-amber","Contemporary"]],
    explanation:`<p><strong>Globalisation</strong> has transformed crime in the late 20th and 21st centuries. Criminal networks now operate transnationally — drug cartels, people traffickers, cybercriminals, and money launderers operate across national borders in ways that individual nation-states cannot easily police. Castells argues global criminal networks mirror the structure of legitimate global capitalism.</p>
<p><strong>Green crime</strong> refers to harm done to the natural environment. Traditional criminology ignores environmental harm because much of it is legal. Green criminologists (South, White) argue that harm rather than legality should define crime. They distinguish primary green crime (direct environmental harm — pollution, deforestation) from secondary green crime (crimes arising from the state's response to environmental issues, such as corruption). The problem is that powerful corporations and states commit the most serious environmental harm with near-impunity.</p>
<p><strong>State crime</strong> refers to illegal or harmful acts committed by governments or their agents. Green (1990) defines it as crimes committed by state agencies in pursuit of state goals. Tombs & Whyte identify state-corporate crime where governments and corporations collude. Examples include genocide, torture, illegal surveillance and war crimes. The difficulty of prosecuting the powerful is a key theme.</p>`,
    thinkers:["Castells","South","White","Green","Tombs & Whyte","Chambliss","Held","Cohen (Stanley)"],
    tip:"Green crime and state crime both challenge traditional definitions — excellent for showing critical thinking. The key tension: who decides what counts as crime, and does the law protect the powerful?",
    questions:[
      {
        num:"01", type:"outline", marks:4,
        text:"Outline two ways in which globalisation has created new patterns of crime.",
        ms:[
          "Transnational organised crime: globalisation enables criminal networks to operate across borders — drug trafficking, people smuggling, cybercrime, money laundering operate through global supply chains states struggle to police (Castells: global criminal networks mirror legitimate global economy)",
          "Cybercrime: the internet creates new crime types with global reach regardless of geography — identity theft, fraud, hacking, phishing, online terrorism. Offender and victim may be in different continents; jurisdiction is unclear",
          "Glocalisation of crime: global criminal organisations (cartels, trafficking networks) integrate local gangs into international supply chains — local crime becomes part of global criminal economy",
          "Consumer demand driving global crime: demand in wealthy nations for cheap goods, drugs, sex drives global trafficking networks — globalisation of markets creates globalisation of crime"
        ]
      },
      {
        num:"02", type:"evaluate", marks:20,
        item:"Green criminologists argue that some of the most serious harms to people and the planet are committed by powerful corporations and states. They argue that traditional criminology has too narrow a definition of crime, focused only on behaviour that breaks existing law. Human rights and global justice approaches suggest we need a broader definition of crime.",
        text:"Applying material from Item B and your knowledge, evaluate the usefulness of a green criminology approach to understanding crime.",
        ms:[
          "Green criminology (South, White): argues traditional criminology is too narrow — defined by legal positivism (crime = what the law says is crime). Green criminology uses harm-based definition: environmental damage, animal rights violations, biodiversity loss are crimes even if legal. Item: 'too narrow a definition of crime focused only on behaviour that breaks existing law'",
          "Primary green crimes (South): direct environmental harm — illegal dumping of toxic waste, illegal logging, poaching protected species, pollution. These are most directly harmful to ecosystems and human health but often under-prosecuted because perpetrators are powerful corporations",
          "Secondary green crimes: illegal acts arising from the state's response — bribery of environmental inspectors, corruption in enforcement agencies. State-corporate crime: Tombs & Whyte — states collude with corporations to avoid regulation (regulatory capture)",
          "Transnational dimension: environmental damage crosses borders — acid rain, ocean pollution, deforestation in Amazon affects global climate. No single state has jurisdiction; international law is weak and non-binding. Paris Agreement non-compliance has no enforcement mechanism",
          "Evaluation — definitional problem: if we extend crime beyond what is illegal, where does it stop? Could criminalise all carbon emissions, meat-eating, etc. Lack of clear boundary undermines the concept's utility for policy and prosecution; creates ideological, not legal, definition",
          "Evaluation — anthropocentric vs biocentric: traditional criminology is human-centred; green criminology is accused of impractical biocentrism (treating all species as equal). However: anthropocentric approach clearly fails — major environmental harms ignored by CJS (item: 'too narrow')",
          "Evaluation — power and enforcement: green criminology correctly identifies that the most harmful actors (corporations, states) are the least prosecuted. But identifying this problem does not solve it — structural power of capital means effective green crime enforcement may be impossible without fundamental social change (Marxist critique)",
          "Evaluation — human rights approach: links green crime to human rights — environmental damage violates the right to clean water, air, land. More tractable legally than biocentrism; can use existing human rights frameworks internationally",
          "Conclusion: green criminology valuably expands the field to address harms that traditional criminology ignores and correctly identifies the power of corporations and states in perpetuating environmental harm. However, it faces definitional challenges and structural obstacles to enforcement that limit its practical application"
        ]
      }
    ]
  },
  {
    id:"crime-control", section:"3.3.1", part:"crime",
    title:"Crime Control, Punishment, Prevention & Victims",
    badges:[["b-blue","Crime & Deviance"],["b-purple","Theory"]],
    explanation:`<p>Sociologists have developed competing approaches to <strong>crime prevention and control</strong>. Situational crime prevention (SCP) — associated with right realism (Wilson, Clarke) — aims to reduce opportunities for crime through target hardening, surveillance, and environmental design. It assumes a rational offender who weighs up risks and benefits.</p>
<p>Social crime prevention focuses on addressing the root causes of crime — poverty, poor socialisation, unemployment — through social programmes. Left realists (Lea & Young) argue SCP treats symptoms and not causes. Marxists argue crime control simply maintains ruling class interests.</p>
<p>Approaches to <strong>punishment</strong> include deterrence (classical school), rehabilitation (positivist criminology), retribution (just deserts), incapacitation, and restorative justice. Foucault's Discipline and Punish traces the shift from public physical punishment to modern disciplinary surveillance. Garland (Culture of Control) charts a shift from rehabilitative modernism to actuarial risk management.</p>
<p><strong>Victims</strong> are often neglected in traditional criminology. Christie's 'ideal victim' concept shows how the CJS responds differentially to victims. Victim surveys (Crime Survey for England and Wales) reveal the dark figure of crime. Zedner emphasises victim-centred criminology. Left realists highlight working-class victimisation.</p>`,
    thinkers:["Wilson & Kelling","Clarke","Lea & Young","Garland","Foucault","Christie","Zedner","Durkheim","Beccaria"],
    tip:"Right realism → situational prevention. Left realism → social prevention. Always evaluate: does SCP just displace crime? Does rehabilitation work? Use evidence from recidivism rates.",
    questions:[
      {
        num:"01", type:"analyse", marks:10,
        item:"Situational crime prevention strategies aim to reduce the opportunity for crime. These strategies assume that the criminal makes a rational decision to commit crime based on perceived risks and benefits. One prevention strategy is to install a burglar alarm to reduce the risk of being burgled.",
        text:"Applying material from Item A and your knowledge, analyse two reasons why situational crime prevention strategies may not be effective in reducing crime.",
        ms:[
          "Displacement (Clarke & Mayhew): SCP does not eliminate crime but displaces it — temporally (different time), spatially (different area), tactically (different method), or by target. Rational offenders adapt around obstacles. Item states SCP assumes rational offenders calculating costs/benefits — the same rational actor can rationally calculate how to avoid the prevention measure. Overall crime rate unchanged; crime merely relocated",
          "Fails to address root causes (left realism, Lea & Young): SCP treats the symptom (opportunity) not the disease (relative deprivation, inequality, unemployment, social exclusion). Items like burglar alarms protect those who can afford them in better-off areas — poorer areas remain vulnerable. Wilson & Kelling's broken windows still sidesteps structural inequality. Social crime prevention (tackling poverty, education) more effective long-term",
          "Not all crime is rational: item explicitly assumes rational cost-benefit calculation. Impulsive crime, crimes of passion, violence under the influence of alcohol or drugs do not involve rational deliberation — deterrence/prevention calculus doesn't apply. Much violent crime in domestic settings cannot be prevented by environmental design",
          "Only addresses visible/street crime: SCP focuses on burglary, car crime, street robbery — ignores corporate crime, white-collar crime, domestic violence, state crime. Reinforces class bias in criminology and CJS; protects propertied classes rather than addressing serious harms"
        ]
      },
      {
        num:"02", type:"outline", marks:6,
        text:"Outline three sociological explanations of why some groups are more likely to be victims of crime than others.",
        ms:[
          "Lifestyle/routine activities theory (Hindelang, Cohen & Felson): victimisation risk linked to lifestyle — time spent in public spaces, association with potential offenders, lack of capable guardianship. Young men at risk because of lifestyle; elderly less at risk despite fear of crime",
          "Structural inequality (left realism, Lea & Young): working-class and Black communities experience highest victimisation rates — concentrated in under-policed, deprived areas with high levels of intra-community crime. Relative deprivation drives both offending and victimisation within same communities",
          "Ideal victim hierarchy (Christie): CJS and media construct hierarchy of 'deserving' victims — young white women, elderly, children receive most attention and support. Sex workers, homeless, those with criminal records are 'unideal' victims — less likely to be believed, supported or have cases prosecuted",
          "Repeat victimisation: those already victimised are disproportionately likely to be victimised again — same property, same person. Concentrated in deprived areas. Explains why crime statistics show highly unequal distribution of victimisation",
          "Domestic violence and patriarchy (feminist criminology): women are disproportionately victimised within the home by male partners. Traditional criminology and CJS historically ignored domestic violence — feminist campaigning forced recognition of it as a crime (Dobash & Dobash)"
        ]
      }
    ]
  },

  {
    id:"research-methods", section:"3.3.2", part:"methods",
    title:"Research Methods: Quantitative & Qualitative",
    badges:[["b-purple","Theory & Methods"]],
    explanation:`<p>Sociologists use a range of research methods, broadly divided into <strong>quantitative</strong> and <strong>qualitative</strong> approaches. The choice of method reflects both practical constraints and theoretical commitments.</p>
<p><strong>Quantitative methods</strong> — questionnaires, structured interviews, official statistics, experiments — produce numerical data that can be analysed statistically. They are associated with the positivist tradition (Durkheim, Comte), which seeks objective, scientific knowledge of society. They are high in <strong>reliability</strong> (results can be replicated) but often lower in <strong>validity</strong> (they may not capture the true meaning of social behaviour).</p>
<p><strong>Qualitative methods</strong> — unstructured interviews, participant observation, focus groups, documents — produce rich, detailed data that accesses meaning and subjective experience. They are associated with interpretivism (Weber, Schutz) and are higher in validity but lower in reliability and representativeness.</p>
<p>The choice of method involves <strong>practical</strong> considerations (cost, access, time, researcher skills), <strong>ethical</strong> considerations (consent, harm, confidentiality, deception) and <strong>theoretical</strong> considerations (positivist vs interpretivist assumptions about the nature of social reality). The PET framework is essential for evaluating any research design.</p>`,
    thinkers:["Durkheim","Weber","Atkinson","Cicourel","Goffman","Glaser & Strauss","BSA","Hawthorne"],
    tip:"For any methods question use PET: Practical, Ethical, Theoretical. Always link your chosen method to the epistemological tradition it belongs to — positivism or interpretivism.",
    questions:[
      {
        num:"05", type:"outline-explain", marks:10,
        text:"Outline and explain two advantages of using official statistics in sociological research.",
        ms:[
          "Scale and representativeness (practical): official statistics cover entire populations — the Crime Survey for England and Wales interviews 35,000+ households. No individual sociologist could replicate this scale. Enables identification of national patterns, longitudinal trends over decades, and regional comparisons — essential for testing sociological theories about structural causes of crime",
          "Reliability (theoretical/positivist): collected using standardised, repeatable procedures allowing comparison across time and place. Durkheim used official suicide statistics in his classic positivist study — enabled identification of social patterns and testing of hypotheses about social integration. Allows correlational and causal analysis consistent with scientific method",
          "Cost and accessibility (practical): already collected at public expense — free for secondary analysis. Saves researcher time and funding; decades of longitudinal data available immediately. Enables replication of previous studies",
          "AO3: dark figure of crime — much crime goes unreported or unrecorded. Social construction: police recording practices, changes in law, victim underreporting mean statistics don't represent objective reality of crime (Cicourel: stats reflect typifications of officers, not actual offending rates)"
        ]
      },
      {
        num:"06", type:"outline", marks:4,
        text:"Outline two ethical considerations a sociologist must take into account when conducting covert participant observation with a criminal gang.",
        ms:[
          "Informed consent: participants cannot consent if research is covert — fundamental breach of BSA ethical guidelines. Some researchers justify covert methods as the only way to access authentic behaviour (Venkatesh, Holdaway) but this involves systematic deception, violating participants' autonomy and right to know they are being studied",
          "Protection of participants from harm: information gathered could expose participants to legal prosecution. Researcher has duty of confidentiality and anonymity — but also faces moral dilemma if witnessing serious crimes. Holdaway's police research — witnessed misconduct; loyalty to research vs duty to report",
          "Harm to researcher: covert fieldwork in criminal organisations poses serious personal danger. Institutions have a duty of care; individual researcher must assess and manage risk. BSA guidelines acknowledge researcher safety as an ethical obligation",
          "Right to withdraw: covert subjects cannot choose to withdraw from a study they don't know is being conducted — further violation of autonomy and informed consent principles"
        ]
      }
    ]
  },
  {
    id:"positivism", section:"3.3.2", part:"methods",
    title:"Positivism, Interpretivism & the Nature of Social Facts",
    badges:[["b-purple","Theory & Methods"]],
    explanation:`<p><strong>Positivism</strong>, associated with Comte and Durkheim, holds that sociology should be modelled on the natural sciences. Social facts — patterns of behaviour external to individuals (suicide rates, crime rates, divorce rates) — can be measured objectively and causal laws identified. Durkheim's study of suicide used official statistics to show that even the most personal act has social causes (level of social integration and moral regulation).</p>
<p><strong>Interpretivism</strong>, associated with Weber and later phenomenologists (Schutz, Berger & Luckmann), argues that because humans act on the basis of meanings, sociology must understand the subjective meaning actors attach to their behaviour (Verstehen — empathetic understanding). Social reality is not an objective thing to be measured but is constantly constructed through social interaction.</p>
<p>The debate has methodological consequences: positivists favour quantitative methods; interpretivists favour qualitative methods. However, most contemporary sociologists use mixed methods, recognising that both approaches offer valuable insights. <strong>Triangulation</strong> — using multiple methods on the same topic — increases validity and reliability.</p>`,
    thinkers:["Comte","Durkheim","Weber","Schutz","Berger & Luckmann","Garfinkel","Giddens","Atkinson"],
    tip:"Durkheim = positivism, social facts, quantitative. Weber = interpretivism, Verstehen, qualitative. Always link epistemology to method choice — why does a positivist use a questionnaire?",
    questions:[
      {
        num:"05", type:"outline-explain", marks:10,
        text:"Outline and explain two differences between positivist and interpretivist approaches to sociological research.",
        ms:[
          "Nature of social reality: positivism (Durkheim) holds that society has objective, external social facts that exist independently of individuals and can be measured — suicide rates, crime rates are real phenomena. Interpretivism (Weber, Schutz) argues social reality is constructed through the meanings actors give to their behaviour — there are no objective social facts independent of human interpretation. Berger & Luckmann: 'The Social Construction of Reality'",
          "Methods and data: positivists favour quantitative methods — surveys, experiments, official statistics — producing numerical data that can be analysed statistically to identify patterns and causal laws. Interpretivists favour qualitative methods — unstructured interviews, participant observation — producing rich data that accesses actors' subjective meanings and achieves Verstehen. Durkheim used official statistics; Goffman used observation",
          "Value freedom: positivists believe sociology can and should be value-free and objective, modelled on natural science. Interpretivists (Weber) acknowledge researcher values inevitably shape topic choice, interpretation, and presentation — advocate value transparency rather than false claims to objectivity",
          "Goal: positivists seek nomothetic knowledge — universal generalisable laws applicable to all societies. Interpretivists seek ideographic knowledge — deep contextual understanding of particular situations and the meanings actors create within them. Different epistemological assumptions about what sociology can and should achieve"
        ]
      },
      {
        num:"06", type:"outline", marks:4,
        text:"Outline two reasons why sociologists might use participant observation rather than questionnaires when researching criminal subcultures.",
        ms:[
          "Validity and access to meanings (interpretivist): participant observation allows researcher to observe behaviour in its natural setting and access the meanings participants attach to their actions — verstehen. Questionnaires impose researcher's categories and may not capture the authentic norms and values of criminal subcultures. Whyte (Street Corner Society) and Venkatesh demonstrate how observation reveals what surveys cannot",
          "Authenticity and trust: members of criminal subcultures are unlikely to answer questionnaires honestly about illegal activities — high social desirability bias. Participant observer who gains trust over time accesses authentic behaviour and views; questionnaire responses would be misleading",
          "Sensitivity of topic (practical/ethical): criminal subcultures cannot be accessed through formal sampling or postal surveys — members are dispersed, distrustful, and not listed in any sampling frame. Observation through snowball sampling or gatekeepers is the only viable access strategy",
          "Hawthorne effect: questionnaire completion is an artificial situation that alters behaviour. Observation in natural setting (especially covert) minimises reactivity — though ethical concerns arise with covert observation"
        ]
      }
    ]
  },
  {
    id:"theory", section:"3.3.2", part:"methods",
    title:"Consensus, Conflict, Structural & Social Action Theories",
    badges:[["b-purple","Theory & Methods"],["b-teal","Core Theory"]],
    explanation:`<p>Sociological theories can be classified along two key dimensions: <strong>structural vs social action</strong>, and <strong>consensus vs conflict</strong>.</p>
<p><strong>Structural theories</strong> (functionalism, Marxism, feminism) explain social behaviour by reference to large-scale social structures that shape and constrain individuals. <strong>Social action theories</strong> (interactionism, phenomenology, ethnomethodology) focus on how individuals create meaning and social reality through interaction.</p>
<p><strong>Consensus theories</strong> (functionalism — Parsons, Durkheim) see society as based on shared values, norms and mutual cooperation. Social institutions serve functions that maintain social stability. <strong>Conflict theories</strong> (Marxism — Marx, Althusser; feminism — Walby, Oakley) see society as characterised by conflict between groups with competing interests — classes, genders, ethnic groups.</p>
<p>Key debates: Can these perspectives be reconciled? Giddens' <strong>structuration theory</strong> attempts to bridge structure and agency — structures are both the medium and outcome of social action. The debate between structure and agency remains central to sociological theory.</p>`,
    thinkers:["Parsons","Durkheim","Marx","Althusser","Gramsci","Weber","Mead","Goffman","Giddens","Walby","Oakley","Garfinkel"],
    tip:"For 20-mark essays: intro (define key concepts) → perspective 1 in depth (theory + evidence) → perspective 2 (contrast/develop) → evaluation of both sides → conclusion with overall judgement. AO3 throughout.",
    questions:[
      {
        num:"06", type:"evaluate", marks:20,
        item:"Marxists see society as based on conflict between social classes. Those who own the means of production are able to exploit those who do not and are also able to impose their views on society. However, different Marxists have different views about the nature of capitalist society and about how social change occurs.",
        text:"Applying material from Item C and your knowledge, evaluate the usefulness of Marxist approaches in understanding society.",
        ms:[
          "Orthodox/structural Marxism (Marx & Engels): economic base (means + relations of production) determines superstructure (law, education, religion, ideology). Bourgeoisie extract surplus value from proletariat. False consciousness prevents class awareness. Historical materialism — capitalism will inevitably be replaced through proletarian revolution",
          "Althusser: Ideological State Apparatuses (education, media, religion) reproduce capitalist relations through ideology; Repressive State Apparatuses (police, army, prison) enforce order through force. Item: 'able to impose their views on society' — more sophisticated than crude base/superstructure determinism",
          "Gramsci — hegemony (item: 'different Marxists have different views'): ruling class rule by consent through cultural hegemony, not just economic/physical force. Counter-hegemony possible through trade unions, political parties, organic intellectuals. More voluntaristic; explains why revolution has not occurred despite exploitation",
          "Applied to crime: Chambliss — laws protect bourgeois property interests; Box — corporate crime massively under-prosecuted; selective enforcement targets working class. Bonger: capitalism creates egoistic conditions breeding crime throughout society",
          "Evaluation — feminism: Marxism neglects patriarchy as an autonomous system of oppression (Walby: six structures of patriarchy predate capitalism). Gender inequality cannot be reduced to class relations — dual systems theory (Hartmann): capitalism and patriarchy are interlocking systems",
          "Evaluation — functionalism (Parsons, Davis & Moore): society is based on consensus and shared values, not conflict. Meritocracy enables social mobility; inequality is functional (role allocation). Marxism overestimates class conflict and underestimates social cohesion",
          "Evaluation — postmodernism (Lyotard): Marxism is a 'grand narrative' falsely claiming to explain all of society — rejected in the fragmented postmodern world. Class is one of many fluid identities; consumption and lifestyle replace class as primary identity. Item of class conflict less applicable in post-industrial societies",
          "Evaluation — social action (Weber): class is one of three dimensions of stratification (+ status and party). Economic determinism is excessive — ideas, culture and meanings also independently shape society (Protestant Ethic and capitalism). Structures do not mechanically determine outcomes; agency matters",
          "Conclusion: Marxism offers powerful analysis of class inequality, capitalist power and ideological reproduction, supported by persistent evidence of class-based inequality. However, it is criticised for economic reductionism, neglect of gender and ethnicity, failure to predict capitalism's resilience, and dismissal by postmodernists as an outdated grand narrative"
        ]
      },
      {
        num:"07", type:"outline-explain", marks:10,
        text:"Outline and explain two ways in which feminist theory has contributed to our understanding of society.",
        ms:[
          "Making women visible (liberal feminism — Oakley): traditional malestream sociology ignored women as subjects of research. Feminist sociologists showed gender inequality is socially constructed not biologically determined — sex (biological) vs gender (social). Applied to research: feminist methodology prioritises women's experiences and challenges androcentric bias in knowledge production",
          "Patriarchy as a structural system (radical feminism — Millett, Firestone): identified patriarchy — systematic male domination across all institutions (family, work, state, law, media). Domestic violence, rape, sexual harassment understood as instruments of patriarchal control not individual pathology. Transformed understanding of private/domestic sphere as a site of power relations",
          "Walby's six structures of patriarchy: paid work, household production, culture, sexuality, violence, the state — comprehensive structural account. Explains how patriarchy persists even as women's formal legal equality increases",
          "Evaluation: feminism is not monolithic — liberal, radical, Marxist and postmodern feminisms disagree fundamentally. Accused of universalising Western, white, middle-class women's experience (Black feminism, intersectionality — Crenshaw: race, class, gender interact). Some argue feminism is now irrelevant in post-feminist era — empirically contested by continuing gender pay gap, domestic violence statistics"
        ]
      }
    ]
  },
  {
    id:"science", section:"3.3.2", part:"methods",
    title:"Science, Objectivity, Value Freedom & Social Policy",
    badges:[["b-purple","Theory & Methods"]],
    explanation:`<p>A central debate in the philosophy of sociology concerns whether sociology can or should be a <strong>science</strong>. Positivists argue it can: social facts exist independently of individuals and can be measured and explained through causal laws. Critics argue the subject matter — conscious, meaning-making humans — makes this impossible and undesirable.</p>
<p><strong>Popper's falsificationism</strong>: a theory is scientific only if it makes testable predictions that could in principle be proved false. Many sociological theories (Marxism, functionalism) are arguably unfalsifiable — they can explain any evidence. <strong>Kuhn's paradigms</strong>: science operates within dominant paradigms until anomalies accumulate and trigger a scientific revolution. Sociology lacks a single dominant paradigm, suggesting it is pre-scientific.</p>
<p><strong>Value freedom</strong>: Weber argued sociologists should be objective in collecting data but acknowledged values inevitably influence topic choice. Gouldner criticised the value-free ideal as itself ideological — all research is shaped by the researcher's position. The question of how sociology relates to <strong>social policy</strong> is connected: should sociologists aim to change society, advise government, or maintain critical distance?</p>`,
    thinkers:["Popper","Kuhn","Weber","Gouldner","Comte","Durkheim","Giddens","Beck","Habermas"],
    tip:"Know Popper (falsificationism), Kuhn (paradigms/scientific revolutions), Weber (value freedom), Gouldner (value-laden sociology). The Hawthorne effect and reflexivity are key reasons sociology differs from natural science.",
    questions:[
      {
        num:"05", type:"outline-explain", marks:10,
        text:"Outline and explain two reasons why some sociologists argue sociology can be regarded as a science.",
        ms:[
          "Social facts and empirical observation (Durkheim/positivism): Durkheim argued that social facts — patterns in social behaviour such as suicide rates — exist independently of individuals and can be measured objectively using the same methods as natural science. His study of suicide used official statistics to identify correlations between social integration, moral regulation and suicide rates — demonstrating that even personal behaviour has measurable social causes. This suggests sociology can produce reliable, replicable, scientific knowledge",

function renderQ(q, qid, topicLabel) {
  const typeMap = {evaluate:'Evaluate — essay',analyse:'Analyse',outline:'Outline','outline-explain':'Outline and explain'};
  const typeLabel = typeMap[q.type] || q.type;
  const isEssay = q.marks >= 20;
  return `<div class="q-block" id="qblock-${qid}">
    <div class="q-num-row">
      <div class="q-num">${q.num||'Q'}</div>
      <span class="q-type-label">${typeLabel}</span>
      <span class="q-marks-badge">[${q.marks} marks]</span>
    </div>
    ${q.item ? `<div class="item-box"><div class="item-label">Item</div><div class="item-text">${q.item}</div></div>` : ''}
    <p class="q-text">${q.text}</p>
    ${isEssay ? `<p class="q-instruction">Answer in continuous prose. For 20-mark questions: aim for 3–4 developed paragraphs with evaluation. For 30-mark questions: aim for 5–6 paragraphs.</p>` : ''}
    <textarea class="answer-area${isEssay?' essay-area':''}" id="ans-${qid}" placeholder="${isEssay?'Write your essay answer here — use continuous prose, develop your argument...':'Write your answer here…'}"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="toggleMS('${qid}')">📋 Mark scheme</button>
      <button class="btn btn-ai" onclick="getAI('${qid}', ${encodeQ(q)})">✨ AI feedback ↗</button>
    </div>
    <div id="ms-${qid}" style="display:none">
      <div class="ms-block">
        <div class="ms-heading">Indicative content — mark scheme</div>
        ${q.ms.map(p=>`<div class="ms-item">${p}</div>`).join('')}
        ${isEssay?`<div class="ms-note">For full marks: sustained argument, multiple perspectives, explicit evaluation (AO3), use of Item, specialist vocabulary throughout.</div>`:''}
      </div>
    </div>
    <div id="ai-${qid}"></div>
  </div>`;
}

function encodeQ(q) {
  return "JSON.parse(decodeURIComponent('" + encodeURIComponent(JSON.stringify(q)) + "'))";
}

function toggleMS(qid) {
  const el = document.getElementById('ms-'+qid);
  const btn = document.querySelector('#qblock-'+qid+' .btn:first-child');
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? '📋 Mark scheme' : '🙈 Hide mark scheme';
}

async function getAI(qid, q) {
  const answer = document.getElementById('ans-'+qid).value.trim();
  const el = document.getElementById('ai-'+qid);
  if (!answer) {
    el.innerHTML = `<div class="ai-block"><div class="ai-heading">No answer yet</div><div class="ai-body">Write something in the box above first, then click AI feedback.</div></div>`;
    return;
  }
  el.innerHTML = `<div class="ai-block"><div class="ai-heading"><span class="loading-dot">●</span> Marking your answer…</div></div>`;
  try {
    const msText = q.ms.join('\n');
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user",content:`You are a strict AQA A-level Sociology examiner. Mark this answer precisely.

Question type: ${q.type} [${q.marks} marks]
Question: ${q.text}
${q.item?'Item: '+q.item:''}

Indicative mark scheme:
${msText}

Student answer:
${answer}

Format your response EXACTLY like this:
**Mark: X/${q.marks}**
One sentence explaining the mark based on AQA bands.

**What worked:**
2 specific points naming the theorist/concept used correctly.

**What's missing:**
1-2 specific gaps naming the exact sociologist/concept/AO3 point not used.

**Improve with:**
One specific sentence they could add verbatim to lift their mark.

Keep total under 150 words. Be precise, direct and use AQA examiner language.`}]
      })
    });
    const data = await r.json();
    const txt = (data.content||[]).map(c=>c.text||'').join('').trim();
    const html = txt.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    const m = txt.match(/(\d+)\s*\/\s*(\d+)/);
    let chip = '';
    if(m){const p=parseInt(m[1])/parseInt(m[2]);chip=`<span class="score-chip ${p>=0.75?'sc-hi':p>=0.5?'sc-mid':'sc-lo'}">${m[1]}/${m[2]}</span>`;}
    el.innerHTML = `<div class="ai-block"><div class="ai-heading">✨ AI examiner feedback ${chip}</div><div class="ai-body">${html}</div></div>`;
  } catch(e) {
    el.innerHTML = `<div class="ai-block"><div class="ai-heading">Connection error</div><div class="ai-body">Could not reach AI. Check your internet and try again.</div></div>`;
  }
}
