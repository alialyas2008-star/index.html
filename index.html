    idea:"Cohen studied the media's reaction to fights between mods and rockers in the 1960s and coined the term <strong>moral panic</strong>. The media massively exaggerated the threat, labelled these groups as <strong>folk devils</strong>, and stirred up public fear. This led to increased police attention, more arrests, and more coverage — a <strong>deviance amplification spiral</strong>. His insight: media coverage of crime can actually <em>create</em> more crime.",
    quote:"Societies appear to be subject, every now and then, to periods of moral panic.",
    topics:["Media & crime","Moral panics","Labelling theory","Social control"]
  },
  "Cohen (Albert)":{
    full:"Albert Cohen",meta:"American criminologist, 1918–2014 · Subcultural Theory",
    idea:"Cohen developed Merton's strain theory to explain <strong>why working-class boys form delinquent gangs</strong>. He argued they experience <strong>status frustration</strong> — they fail in a school system built around middle-class values, so they form subcultures that <em>invert</em> mainstream values. Instead of working hard for grades, they gain status through rule-breaking, vandalism, and fighting.",
    quote:"The delinquent subculture... takes its norms from the larger culture, but turns them upside down.",
    topics:["Subcultures","Crime & deviance","Class & crime","Strain theory"]
  },
  "Cicourel":{
    full:"Aaron Cicourel",meta:"American sociologist, b.1928 · Ethnomethodology / Labelling",
    idea:"Cicourel studied juvenile justice and found that police and courts use <strong>typifications</strong> — stereotypes about what a typical criminal looks like (young, working-class, Black). If you fit the stereotype, you're more likely to be stopped, arrested, and convicted. If you're middle-class, your family can negotiate better treatment. This means official crime statistics <strong>tell us more about police behaviour than actual crime</strong>.",
    quote:"Official statistics of deviance are the product of the interpretive practices of police, probation officers and courts.",
    topics:["Crime statistics","Labelling","Class & crime","Ethnicity & crime"]
  },
  "Heidensohn":{
    full:"Frances Heidensohn",meta:"British feminist criminologist, 1942–2021 · Feminist Criminology",
    idea:"Heidensohn asked: why do women commit so much less crime than men? Her answer: <strong>women are controlled more</strong>. At home, they're expected to be wives and mothers. In public, the threat of male violence restricts where they go and what they do. At work, they face sexual harassment. This <strong>double standard of control</strong> limits women's opportunity to offend — it's not that women are naturally better behaved.",
    quote:"Women experience greater social control than men, and this accounts for their lower crime rates.",
    topics:["Gender & crime","Social control","Feminist criminology"]
  },
  "Pollak":{
    full:"Otto Pollak",meta:"German-American criminologist, 1908–1998 · Chivalry thesis",
    idea:"Pollak argued that female crime is massively <strong>hidden and underrecorded</strong>. Women are naturally more deceitful (a controversial claim), and police and judges treat them more leniently — the <strong>chivalry thesis</strong>. Men in the CJS are less willing to arrest, charge, or convict women. So official statistics make women look less criminal than they really are.",
    quote:"The chivalrous attitude of men toward women makes it difficult to detect female crime.",
    topics:["Gender & crime","Crime statistics","CJS"]
  },
  "Messerschmidt":{
    full:"James Messerschmidt",meta:"American criminologist, b.1951 · Masculinities Theory",
    idea:"Messerschmidt argued that crime is a way of <strong>doing masculinity</strong>. Young men — especially working-class or Black men with few legitimate ways to prove their manhood — use crime, violence, and risk-taking to accomplish a masculine identity. Different types of masculinity lead to different types of crime. This explains why most offenders are male without resorting to biology.",
    quote:"Crime is a resource for accomplishing masculinity when other resources are unavailable.",
    topics:["Gender & crime","Masculinity","Crime & deviance","Subcultures"]
  },
  "Hall et al.":{
    full:"Stuart Hall, Chas Critcher et al.",meta:"British cultural theorists, 1978 · Neo-Marxism / Cultural Studies",
    idea:"In <em>Policing the Crisis</em> (1978), Hall argued that the 1970s media panic about 'mugging' was not just about crime — it was an <strong>ideological response to the crisis of capitalism</strong>. The ruling class used the panic to distract from economic problems, justify expanding state power, and scapegoat Black youth. Crime panics serve political purposes — they shift attention away from structural inequality.",
    quote:"The mugging panic was one of the first signs we were beginning to enter the 'law and order' society.",
    topics:["Media & crime","Moral panics","Ethnicity & crime","Marxism"]
  },
  "Macpherson":{
    full:"Sir William Macpherson",meta:"British judge, report published 1999",
    idea:"Following the murder of Black teenager Stephen Lawrence and the Metropolitan Police's failure to convict his killers, Macpherson led a public inquiry. His report concluded that the Met was guilty of <strong>institutional racism</strong> — not individual racist officers, but racist attitudes and practices embedded in the culture of the organisation. The report made 70 recommendations and led to major changes in policing and equality law.",
    quote:"The Metropolitan Police Service is institutionally racist.",
    topics:["Ethnicity & crime","Policing","Institutional racism"]
  },
  "Walklate":{
    full:"Sandra Walklate",meta:"British feminist criminologist, b.1951 · Victimology",
    idea:"Walklate is known for her work on <strong>victims of crime</strong>, particularly women. She challenged traditional criminology for ignoring victims, especially women victimised in the home. She developed <strong>critical victimology</strong> — questioning who gets recognised as a 'real' victim and who gets blamed. She argued that victim surveys, not official police statistics, give a more accurate picture of victimisation.",
    quote:"The concept of the ideal victim serves to exclude from consideration those whose victimisation departs from the expected.",
    topics:["Victims","Gender & crime","Feminist criminology"]
  },
  "Lea & Young":{
    full:"John Lea & Jock Young",meta:"British criminologists, 1984 · Left Realism",
    idea:"Lea and Young were left realists — they argued that Marxist criminology ignored the real suffering of working-class communities from crime. Their explanation: crime results from the combination of <strong>relative deprivation</strong> (feeling poor compared to others), <strong>marginalisation</strong> (excluded from power), and <strong>subculture</strong> (a group solution). They used their <strong>square of crime</strong> model — offender, victim, police, public — to argue for community-based solutions.",
    quote:"The task is to explain why the poor commit crimes against the poor.",
    topics:["Left realism","Crime & deviance","Class & crime","Victimology"]
  },
  "Castells":{
    full:"Manuel Castells",meta:"Spanish sociologist, b.1942 · Network Society",
    idea:"Castells argued we now live in a <strong>network society</strong> where power flows through global information networks rather than nation-states alone. He applied this to crime: <strong>global criminal organisations mirror legitimate global capitalism</strong> — they are flexible, networked, transnational, and harder to police than traditional state-based crime. Drug cartels, people traffickers, and cybercriminals all operate through the same kind of networked logic as multinational corporations.",
    quote:"The criminal economy is global, flexible, and networked — it operates in the same space of flows as legitimate capital.",
    topics:["Globalisation","Transnational crime","Contemporary crime"]
  },
  "South":{
    full:"Nigel South",meta:"British criminologist · Green Criminology",
    idea:"South is a founder of <strong>green criminology</strong> — the study of environmental crimes and harms. He argued that traditional criminology ignores devastating environmental destruction because much of it is <em>legal</em>. He distinguished between <strong>primary green crimes</strong> (direct environmental harm — pollution, deforestation, poaching) and <strong>secondary green crimes</strong> (crimes that arise from the state's response to environmental issues, like corruption or cover-ups).",
    quote:"Green criminology must move beyond law to focus on the full range of environmental harm.",
    topics:["Green crime","Environmental harm","Contemporary crime"]
  },
  "White":{
    full:"Rob White",meta:"Australian criminologist · Green Criminology",
    idea:"White developed green criminology with a focus on <strong>justice for the environment and non-human species</strong>. He argued we should adopt a <strong>biocentric</strong> approach — recognising that animals and ecosystems have rights, not just humans. Corporate destruction of rainforests or factory farming causes massive harm but is legal — the law protects property, not nature. We need a new framework of environmental justice.",
    quote:"Green criminology challenges us to think beyond human-centred notions of harm and justice.",
    topics:["Green crime","Environmental justice","Contemporary crime"]
  },
  "Tombs & Whyte":{
    full:"Steve Tombs & David Whyte",meta:"British critical criminologists · Corporate Crime",
    idea:"Tombs and Whyte argue that <strong>corporate and state crime causes far more harm than street crime</strong> — workplace deaths, pollution, financial fraud — but is massively under-prosecuted. They coined the term <strong>state-corporate crime</strong>: when governments and corporations work together to break the law or cause harm with impunity. They argue the CJS is structurally biased towards protecting the powerful.",
    quote:"Corporate crime kills more people than all street crime combined.",
    topics:["State crime","Corporate crime","Green crime","Marxism"]
  },
  "Clarke":{
    full:"Ron Clarke",meta:"British criminologist · Situational Crime Prevention",
    idea:"Clarke developed <strong>situational crime prevention (SCP)</strong> — the idea that crime can be reduced by making it harder, riskier, or less rewarding to commit. Target hardening (locks, alarms, CCTV), increasing the chance of getting caught, and reducing the rewards of crime all work by changing the rational calculation of would-be offenders. Associated with right realism — focuses on opportunity, not social causes.",
    quote:"Reducing the opportunities for crime is as important as dealing with its underlying causes.",
    topics:["Crime prevention","Right realism","Situational crime prevention"]
  },
  "Garland":{
    full:"David Garland",meta:"British criminologist, b.1955 · Sociology of Punishment",
    idea:"Garland argued that in late modernity, crime control has shifted from <strong>rehabilitative optimism</strong> (the idea that offenders can be reformed) to a <strong>culture of control</strong> — focused on risk management, punitive imprisonment, and protecting the public. He identified two contradictory responses: <strong>adaptive strategies</strong> (crime prevention, multi-agency working) and <strong>punitive sovereignty</strong> (harsher sentences, prison expansion). The 'nothing works' thesis killed rehabilitation.",
    quote:"We have moved from a culture of welfarism to a culture of control.",
    topics:["Punishment","Crime control","Late modernity","CJS"]
  },
  "Christie":{
    full:"Nils Christie",meta:"Norwegian criminologist, 1928–2015 · Victimology",
    idea:"Christie identified the concept of the <strong>'ideal victim'</strong> — the type of person society and the CJS most readily recognises as a genuine crime victim: weak, innocent, doing something respectable, attacked by a stranger. Women, children, and the elderly fit this image. Working-class, Black, homeless, or sex worker victims are seen as 'unideal' — blamed, disbelieved, or ignored. This shapes policing, prosecution, and media coverage.",
    quote:"The ideal victim is a person or category of individuals who, when hit by crime, most readily are given the complete and legitimate status of being a victim.",
    topics:["Victims","Victimology","CJS","Media & crime"]
  },
  "Wilson & Kelling":{
    full:"James Q. Wilson & George Kelling",meta:"American criminologists, 1982 · Right Realism",
    idea:"Wilson and Kelling proposed the <strong>broken windows theory</strong>: minor disorder (graffiti, broken windows, rough sleeping) signals that an area is not cared for, which attracts more serious crime. The solution: zero tolerance policing of minor disorder to maintain order. Associated with right realism — focuses on individual choice and neighbourhood environment, not social inequality. Influenced 1990s New York policing under Giuliani.",
    quote:"One unrepaired broken window is a signal that no one cares, and so breaking more windows costs nothing.",
    topics:["Right realism","Crime prevention","Policing","Social order"]
  },
  "Comte":{
    full:"Auguste Comte",meta:"French philosopher, 1798–1857 · Founder of Positivism",
    idea:"Comte founded <strong>positivism</strong> — the idea that society can be studied scientifically, just like the physical world. He believed sociology could discover the laws governing social behaviour through observation and evidence, and use that knowledge to improve society. He called sociology 'the queen of the sciences'. His work laid the foundation for Durkheim's empirical approach.",
    quote:"Know in order to predict, predict in order to control.",
    topics:["Positivism","Sociological methods","Science"]
  },
  "Weber":{
    full:"Max Weber",meta:"German sociologist, 1864–1920 · Interpretivism",
    idea:"Weber disagreed with Durkheim's purely scientific approach. He argued sociology must understand the <strong>subjective meanings</strong> people give to their actions — he called this <strong>Verstehen</strong> (empathetic understanding). You can't explain why someone got married just by looking at statistics — you need to understand what marriage means to them. He also argued that class is not the only source of inequality — <strong>status</strong> (social honour) and <strong>party</strong> (political power) matter too.",
    quote:"Sociology is a science which attempts the interpretive understanding of social action.",
    topics:["Interpretivism","Social action theory","Stratification","Value freedom"]
  },
  "Atkinson":{
    full:"J. Maxwell Atkinson",meta:"British sociologist · Interpretivism / Labelling",
    idea:"Atkinson applied labelling theory to <strong>suicide statistics</strong>. He argued that official suicide statistics don't record actual suicides — they record the <em>verdicts of coroners</em>. Coroners use their own typifications (leaving a note, a history of depression, the method used) to decide whether a death counts as suicide. So Durkheim's 'social facts' about suicide are actually social constructions — they reflect how death is labelled, not an objective reality.",
    quote:"The social construction of suicide statistics means we can never know the 'true' suicide rate.",
    topics:["Positivism","Interpretivism","Research methods","Crime statistics"]
  },
  "Glaser & Strauss":{
    full:"Barney Glaser & Anselm Strauss",meta:"American sociologists, 1967 · Grounded Theory",
    idea:"Glaser and Strauss developed <strong>grounded theory</strong> — a qualitative research approach that builds theory from data rather than testing pre-existing hypotheses. Instead of starting with a theory and looking for evidence, the researcher immerses themselves in the data (usually interviews or observations) and allows categories and theories to <strong>emerge</strong> from it. Associated with the interpretivist tradition.",
    quote:"Theory must emerge from — be grounded in — the data.",
    topics:["Qualitative methods","Interpretivism","Research design"]
  },
  "BSA":{
    full:"British Sociological Association",meta:"Professional body · Research Ethics",
    idea:"The BSA sets the <strong>ethical guidelines</strong> for sociological research in the UK. Key principles: <strong>informed consent</strong> (participants must know they are being researched and agree freely), <strong>no harm to participants</strong> (physical or psychological), <strong>confidentiality and anonymity</strong>, and the <strong>right to withdraw</strong>. Covert research is only justifiable if no other method is possible and the social value of the research is high.",
    quote:"Sociologists have a responsibility to ensure that the physical, social and psychological well-being of research participants is not adversely affected.",
    topics:["Research ethics","Qualitative methods","Research design"]
  },
  "Popper":{
    full:"Karl Popper",meta:"Austrian-British philosopher, 1902–1994 · Philosophy of Science",
    idea:"Popper argued that science advances through <strong>falsification</strong> — a theory is only scientific if it makes predictions that could in principle be proved wrong. You can never <em>prove</em> a theory is true, only fail to disprove it. A theory that can explain everything (like 'God did it') is unscientific because nothing could falsify it. He was suspicious of Marxism and Freudianism for this reason — they seemed to explain every outcome, so they couldn't be tested.",
    quote:"The criterion of the scientific status of a theory is its falsifiability, or refutability, or testability.",
    topics:["Science","Positivism","Sociological theory","Research methods"]
  },
  "Kuhn":{
    full:"Thomas Kuhn",meta:"American philosopher of science, 1922–1996 · Scientific Revolutions",
    idea:"Kuhn argued that science doesn't progress smoothly — it goes through revolutions. At any time, scientists work within a <strong>paradigm</strong> — a shared framework of assumptions and methods (e.g. Newtonian physics). Anomalies build up until there's a <strong>paradigm shift</strong> (e.g. Einstein's relativity). Sociology, he implied, lacks a single dominant paradigm — different schools (Marxism, functionalism, feminism) fundamentally disagree, suggesting sociology is <strong>pre-scientific</strong>.",
    quote:"Normal science does not aim at novelties of fact or theory and, when successful, finds none.",
    topics:["Science","Sociology as science","Sociological theory"]
  },
  "Gouldner":{
    full:"Alvin Gouldner",meta:"American sociologist, 1920–1980 · Critical Sociology",
    idea:"Gouldner attacked the idea of <strong>value-free sociology</strong>. He argued that claiming to be neutral is itself a political choice — it supports the status quo by not challenging it. Sociologists who claim to just 'describe' society are actually serving the powerful. He called on sociologists to be honest about their values and use sociology to challenge inequality and oppression, not just describe it.",
    quote:"The myth of a value-free sociology has been the bad faith of our era.",
    topics:["Value freedom","Objectivity","Social policy","Sociological theory"]
  },
  "Giddens":{
    full:"Anthony Giddens",meta:"British sociologist, b.1938 · Structuration & Late Modernity",
    idea:"Giddens tried to bridge the structure vs agency debate with <strong>structuration theory</strong> — structures (like class, language, institutions) are both shaped by human action and shape that action in return. He also argued we live in <strong>late modernity</strong>, not postmodernity — society has become more reflexive and risky, but hasn't fundamentally broken with modernity. Individuals now engage in an ongoing '<strong>project of the self</strong>' — constantly constructing their identity through choices.",
    quote:"Modernity is not post-traditional — it is a reflexive ordering of post-traditional conditions.",
    topics:["Late modernity","Structuration","Identity","Sociological theory"]
  },
  "Beck":{
    full:"Ulrich Beck",meta:"German sociologist, 1944–2015 · Risk Society",
    idea:"Beck argued that modern societies have become <strong>risk societies</strong>. In the past, the main risks people faced were natural (floods, famine). Now, the biggest risks are <strong>manufactured</strong> — created by industrial progress itself: climate change, nuclear accidents, GM food. These risks are global, invisible, and can't be insured against. They cut across class lines (though the poor are still most vulnerable), making risk the new organising principle of society.",
    quote:"Risk may be defined as a systematic way of dealing with hazards and insecurities induced and introduced by modernisation itself.",
    topics:["Risk society","Late modernity","Green crime","Globalisation"]
  },
  "Lyotard":{
    full:"Jean-François Lyotard",meta:"French philosopher, 1924–1998 · Postmodernism",
    idea:"Lyotard is best known for declaring an '<strong>incredulity towards metanarratives</strong>' — the defining feature of postmodernism. Grand theories like Marxism, functionalism, and science all claim to tell the complete story of society and promise progress. Lyotard argued these are <strong>false certainties</strong> — in postmodern society, we no longer believe any single framework can capture truth. Knowledge is local, fragmented, and plural.",
    quote:"I define postmodern as incredulity towards metanarratives.",
    topics:["Postmodernism","Sociological theory","Knowledge","Late modernity"]
  },
  "Baudrillard":{
    full:"Jean Baudrillard",meta:"French sociologist, 1929–2007 · Postmodernism",
    idea:"Baudrillard argued that in postmodern society, <strong>images and simulations have replaced reality</strong>. We live in a world of <strong>hyperreality</strong> — where the copy is more real than the original. Media images of crime, for example, become more powerful in shaping public fear than actual crime. His most provocative claim: 'The Gulf War did not take place' — meaning the media simulation of the war was more real to most people than the actual conflict.",
    quote:"The simulacrum is never what hides the truth — it is the truth that hides the fact there is none.",
    topics:["Postmodernism","Media & crime","Hyperreality","Sociological theory"]
  },
  "Bauman":{
    full:"Zygmunt Bauman",meta:"Polish-British sociologist, 1925–2017 · Liquid Modernity",
    idea:"Bauman coined the term <strong>liquid modernity</strong> — all the 'solid' certainties of modern life (stable jobs, fixed communities, religious faith, class identity) have dissolved. We now live in a fluid, uncertain world where nothing is fixed. This gives individuals freedom but also produces anxiety and insecurity. Identity is now something you constantly construct through consumption choices, not something given by class or tradition. The Holocaust showed the dark potential of modernity's bureaucratic rationality.",
    quote:"Liquid modernity is a world in which the conditions under which its members act change faster than it takes the ways of acting to consolidate into habits.",
    topics:["Late modernity","Postmodernism","Identity","Consumption"]
  },
  "Walby":{
    full:"Sylvia Walby",meta:"British feminist sociologist, b.1953 · Patriarchy Theory",
    idea:"Walby defined <strong>patriarchy</strong> as a system of social structures and practices in which men dominate, oppress, and exploit women. She identified <strong>six structures of patriarchy</strong>: paid work (unequal pay, glass ceiling), household production (unpaid domestic labour), culture (sexist media), sexuality (control of women's bodies), violence (domestic and sexual violence), and the state (laws and policies that disadvantage women). All six must be challenged for equality.",
    quote:"Patriarchy is a system of social structures and practices in which men dominate, oppress and exploit women.",
    topics:["Feminism","Patriarchy","Gender inequality","Marxism critique"]
  },
  "Oakley":{
    full:"Ann Oakley",meta:"British feminist sociologist, b.1944 · Feminist Methodology",
    idea:"Oakley made the crucial distinction between <strong>sex</strong> (biological — male/female) and <strong>gender</strong> (social — masculine/feminine). Gender roles are not natural — they are learned through socialisation. She also critiqued mainstream sociological research methods as <strong>androcentric</strong> (male-biased), arguing that feminist research should be based on empathy and rapport rather than detached objectivity, giving voice to women's own experiences.",
    quote:"Gender is a social product — it is what culture makes of biological sex.",
    topics:["Feminism","Gender","Socialisation","Research methods"]
  },
  "Goffman":{
    full:"Erving Goffman",meta:"Canadian-American sociologist, 1922–1982 · Interactionism",
    idea:"Goffman studied how people <strong>manage their identity in everyday social interactions</strong>. His key concept: <strong>dramaturgy</strong> — social life is like a performance, with a front stage (where we present our best self) and back stage (where we're ourselves). He also developed the concept of <strong>stigma</strong> — a 'spoiled identity' attached to people with mental illness, disability, or criminal records. Labelled individuals are reduced from full persons to tainted, discounted ones.",
    quote:"When an individual enters the presence of others, they commonly seek to acquire information about him or to bring into play information already possessed.",
    topics:["Social interaction","Labelling","Stigma","Identity"]
  },
  "Garfinkel":{
    full:"Harold Garfinkel",meta:"American sociologist, 1917–2011 · Ethnomethodology",
    idea:"Garfinkel founded <strong>ethnomethodology</strong> — the study of how ordinary people make sense of the social world and maintain everyday reality. He ran famous <strong>breaching experiments</strong>: asking students to behave as if they were guests in their own homes, or to respond to 'how are you?' with a literal, detailed answer. These experiments revealed the hidden rules we all follow without knowing — and showed how fragile social order really is.",
    quote:"The objective reality of social facts is sociology's fundamental phenomenon.",
    topics:["Ethnomethodology","Social action theory","Research methods","Social order"]
  },
  "Berger & Luckmann":{
    full:"Peter Berger & Thomas Luckmann",meta:"American sociologists, 1966 · Social Constructionism",
    idea:"In <em>The Social Construction of Reality</em> (1966), Berger and Luckmann argued that social reality is not a fixed, objective thing — it is <strong>constructed by humans through interaction</strong> and then becomes taken for granted as 'just how things are' (reification). Institutions like the family, education, and religion are human creations that come to seem natural and inevitable. This is a phenomenological approach — focuses on subjective meaning-making.",
    quote:"Society is a human product. Society is an objective reality. Man is a social product.",
    topics:["Social constructionism","Interpretivism","Knowledge","Sociological theory"]
  },
  "Chambliss":{
    full:"William Chambliss",meta:"American Marxist criminologist, 1933–2014",
    idea:"Chambliss argued that <strong>law serves the interests of the ruling class</strong>. In his famous study of two gangs — the middle-class 'Saints' and the working-class 'Roughnecks' — both broke the law equally, but only the Roughnecks were arrested and prosecuted. The Saints came from families that could negotiate with police and courts. He also exposed <strong>state-organised crime</strong> — arguing that governments themselves engage in illegal activities.",
    quote:"Acts are defined as criminal because it is in the interest of the ruling class to so define them.",
    topics:["Marxist criminology","Class & crime","Law","State crime"]
  },
  "Harvey":{
    full:"David Harvey",meta:"British Marxist geographer, b.1935 · Postmodernity critique",
    idea:"Harvey offered a Marxist critique of postmodernism. He argued that <strong>postmodern culture is not a sign of a new society but a product of late capitalism</strong> — specifically 'flexible accumulation', where capital moves rapidly around the globe. The fragmentation, style-mixing, and identity flux of postmodernity reflects capitalism's need for flexible workers and consumers, not a genuine cultural revolution. Inequality and class remain central.",
    quote:"Postmodernism is what you get when capitalism goes flexible.",
    topics:["Postmodernism critique","Marxism","Late modernity","Identity"]
  },
  "Harding":{
    full:"Sandra Harding",meta:"American feminist philosopher, b.1935 · Standpoint Epistemology",
    idea:"Harding argued that <strong>all knowledge reflects the social position of those who produce it</strong>. Male-dominated science claims objectivity but actually reflects male, Western, bourgeois perspectives. Her concept of <strong>standpoint epistemology</strong>: knowledge produced from the standpoint of marginalised groups (women, minorities) is actually <em>more</em> objective, because marginalised people must understand both their own perspective and the dominant one to survive.",
    quote:"The view from the margins is less distorted than the view from the top.",
    topics:["Feminist methodology","Objectivity","Value freedom","Research methods"]
  },
  "Dobash & Dobash":{
    full:"Rebecca & Russell Dobash",meta:"British sociologists · Feminist Criminology",
    idea:"The Dobashes conducted landmark research into <strong>domestic violence</strong>, interviewing 109 women in Scottish women's refuges. They argued that domestic violence is not individual pathology but a <strong>product of patriarchal power structures</strong> — men use violence to control women. Traditional criminology and the police had treated domestic violence as a private matter. Their research was central to getting domestic violence recognised and prosecuted as a serious crime.",
    quote:"Wife assault is not a private trouble but a public issue rooted in patriarchy.",
    topics:["Domestic violence","Feminist criminology","Victims","Patriarchy"]
  },
  "Cloward & Ohlin":{
    full:"Richard Cloward & Lloyd Ohlin",meta:"American criminologists, 1960 · Differential Opportunity Theory",
    idea:"Cloward and Ohlin extended Merton and Cohen by pointing out that people don't just lack legitimate opportunities — they also have <strong>differential access to illegitimate opportunities</strong>. This produces three types of subculture: <strong>criminal subcultures</strong> (stable areas where criminal careers are available — organised crime), <strong>conflict subcultures</strong> (unstable areas with high violence — gang warfare for territory), and <strong>retreatist subcultures</strong> (those who fail at both — drug users).",
    quote:"Delinquent subcultures reflect the conditions under which access to both legitimate and illegitimate opportunity is differentially distributed.",
    topics:["Subcultures","Strain theory","Crime & deviance","Class & crime"]
  },
  "Schutz":{
    full:"Alfred Schutz",meta:"Austrian-American philosopher, 1899–1959 · Phenomenology",
    idea:"Schutz applied phenomenological philosophy to sociology. He argued that social reality is built from <strong>shared stocks of common sense knowledge</strong> — the taken-for-granted background knowledge we use to make sense of everyday life. Sociology should study how actors construct a shared social world through meaningful action. This is the foundation of <strong>interpretivism</strong> — social reality is inter-subjective, constructed through shared meanings, not an objective external fact.",
    quote:"The world of everyday life is the paramount reality.",
    topics:["Phenomenology","Interpretivism","Social action theory","Social order"]
  },
  "Mead":{
    full:"George Herbert Mead",meta:"American philosopher, 1863–1931 · Symbolic Interactionism",
    idea:"Mead is the founder of <strong>symbolic interactionism</strong> — the theory that humans act based on the <em>meanings</em> they attach to things, and those meanings are created and modified through social interaction. He argued the <strong>self</strong> develops through social interaction: the 'I' (the spontaneous self) and the 'me' (the social self that internalises others' expectations — the 'generalised other'). Society exists in and through the interactions of individuals.",
    quote:"The self is something which has a development; it is not initially there at birth, but arises in the process of social experience.",
    topics:["Symbolic interactionism","Social action theory","Identity","Socialisation"]
  },
  "Cohen & Felson":{
    full:"Lawrence Cohen & Marcus Felson",meta:"American criminologists, 1979 · Routine Activities Theory",
    idea:"Cohen and Felson's <strong>routine activities theory</strong> says crime occurs when three things come together at the same time and place: a <strong>motivated offender</strong>, a <strong>suitable target</strong>, and the <strong>absence of a capable guardian</strong>. Crime rates rose in the 1960s–70s not because more people wanted to commit crime but because routine activities changed — more women in work, more people out of the home, more portable consumer goods — creating more criminal opportunities.",
    quote:"Crime occurs when a motivated offender converges with a suitable target in the absence of capable guardianship.",
    topics:["Routine activities","Crime prevention","Victims","Right realism"]
  }
};

function showTheorist(name) {
  const t = THEORISTS[name];
  if (!t) return;
  const existing = document.getElementById('th-overlay');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'th-overlay';
  div.id = 'th-overlay';
  div.onclick = (e) => { if(e.target===div) div.remove(); };
  div.innerHTML = `
    <div class="th-modal">
      <div class="th-modal-name">${t.full}</div>
      <div class="th-modal-meta">${t.meta}</div>
      <div class="th-modal-idea">${t.idea}</div>
      <div class="th-modal-quote">"${t.quote}"</div>
      <div class="th-modal-topics">${t.topics.map(tp=>`<span class="badge b-purple">${tp}</span>`).join('')}</div>
      <button class="th-modal-close" onclick="document.getElementById('th-overlay').remove()">Close</button>
    </div>
  `;
  document.body.appendChild(div);
}

</script>
</body>
</html>
